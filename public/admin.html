<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObserveCo License CRM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--radius:8px;--font:-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);padding:16px;line-height:1.5}
h1{font-size:1.4rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
h1 small{font-size:0.7rem;color:var(--text-dim);font-weight:400}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-width:80px}
.stat .num{font-size:1.5rem;font-weight:700;display:block}
.stat .label{font-size:0.75rem;color:var(--text-dim);text-transform:uppercase}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.9rem}
.toolbar input{flex:1;min-width:200px}
.toolbar select{min-width:120px}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:0.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:0.85rem}
th{background:var(--surface);color:var(--text-dim);font-weight:600;font-size:0.75rem;text-transform:uppercase}
tr:last-child td{border-bottom:none}
.status{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.75rem;font-weight:600}
.status-active{background:#3fb95022;color:var(--green)}
.status-trialing{background:#d2992222;color:var(--yellow)}
.status-expired{background:#f8514922;color:var(--red)}
.status-cancelled{background:#8b949e22;color:var(--text-dim)}
.key-mono{font-family:monospace;font-size:0.8rem;color:var(--text-dim);letter-spacing:0.5px}
.empty{text-align:center;padding:40px;color:var(--text-dim);font-size:0.9rem}
.login-box{max-width:400px;margin:60px auto;text-align:center}
.login-box input{width:100%;padding:12px;margin:12px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;text-align:center}
.error{color:var(--red);font-size:0.85rem;margin-top:8px}
.loading{text-align:center;padding:40px;color:var(--text-dim)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000088;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:420px;width:90%}
.modal-content h2{margin-bottom:16px;font-size:1.1rem}
.modal-content label{display:block;font-size:0.85rem;color:var(--text-dim);margin-bottom:4px;margin-top:12px}
.modal-content input,.modal-content select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.9rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 24px #00000044;font-size:0.85rem;display:none;z-index:200;max-width:360px}
.toast.show{display:block}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
@media(max-width:600px){h1{font-size:1.1rem}.toolbar{flex-direction:column}table{font-size:0.8rem}th,td{padding:6px 8px}}
</style>
</head>
<body>

<div id="app">
  <div id="loginView" class="login-box">
    <h1>🛡️ ObserveCo Licenses</h1>
    <p style="color:var(--text-dim);font-size:0.85rem">Enter your admin API key</p>
    <input type="password" id="apiKeyInput" placeholder="Paste your admin API key" autofocus>
    <button class="btn btn-primary" onclick="login()" style="width:100%">Unlock Dashboard</button>
    <p id="loginError" class="error"></p>
  </div>

  <div id="dashboardView" style="display:none">
    <h1>🛡️ ObserveCo Licenses <small>CRM</small> <span style="font-size:0.7rem;font-weight:400;color:var(--text-dim);margin-left:auto">
      <a href="#" onclick="showAuditLog()" style="color:var(--accent);text-decoration:none">📋 Audit Log</a>
      <span style="margin:0 8px;color:var(--border)">|</span>
      <a href="#" onclick="exportCsv()" style="color:var(--accent);text-decoration:none">📥 CSV</a>
    </span></h1>

    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search by email or name..." oninput="refresh()">
      <select id="filterSelect" onchange="refresh()">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="trialing">Trial</option>
        <option value="expired">Expired</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select id="sortSelect" onchange="refresh()">
        <option value="created_at">Newest</option>
        <option value="email">Email A-Z</option>
        <option value="status">By Status</option>
        <option value="expires_at">Expiring Soon</option>
      </select>
      <button class="btn btn-green" onclick="showIssueModal()">+ Issue Free License</button>
      <button class="btn btn-primary" style="background:var(--text-dim)" onclick="refresh()">↻ Refresh</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Name</th>
          <th>Product</th>
          <th>Status</th>
          <th>License Key</th>
          <th>Created</th>
          <th>Expires</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h2>Edit License</h2>
    <input type="hidden" id="editKey">
    <label for="editEmail">Email</label>
    <input type="email" id="editEmail">
    <label for="editName">Name</label>
    <input type="text" id="editName">
    <label for="editProduct">Product</label>
    <select id="editProduct">
      <option value="solo">Solo ($9/mo)</option>
    </select>
    <label for="editExpires">Expires</label>
    <input type="date" id="editExpires">
    <label for="editNotes">Admin Notes</label>
    <textarea id="editNotes" style="width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.9rem;font-family:inherit;min-height:60px;resize:vertical"></textarea>
    <div class="modal-actions">
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditLicense()">Save</button>
    </div>
    <p id="editError" class="error"></p>
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-content" style="max-width:640px;max-height:80vh;overflow-y:auto">
    <h2 id="detailTitle">License Details</h2>
    <div id="detailBody" style="font-size:0.85rem">Loading...</div>
    <div class="modal-actions">
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="closeDetailModal()">Close</button>
    </div>
  </div>
</div>

<div class="modal" id="issueModal">
  <div class="modal-content">
    <h2>Issue Free License</h2>
    <label for="issueEmail">Email *</label>
    <input type="email" id="issueEmail" placeholder="user@example.com">
    <label for="issueName">Name</label>
    <input type="text" id="issueName" placeholder="Optional">
    <label for="issueDuration">Duration</label>
    <select id="issueDuration">
      <option value="30">30 days</option>
      <option value="90">90 days</option>
      <option value="365" selected>1 year</option>
      <option value="36500">Lifetime (~100 years)</option>
    </select>
    <label for="issueProduct">Product</label>
    <select id="issueProduct">
      <option value="solo">Solo ($9/mo)</option>
    </select>
    <div class="modal-actions">
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="closeIssueModal()">Cancel</button>
      <button class="btn btn-primary" onclick="issueLicense()">Create License</button>
    </div>
    <p id="issueError" class="error"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let apiKey = '';
let licenses = [];
let products = [];
let keyCache = null;

function login() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) {
    document.getElementById('loginError').textContent = 'Enter your API key';
    return;
  }

  // Store in localStorage
  try { localStorage.setItem('observeco_admin_key', apiKey); } catch(e) {}

  // Test the key by fetching stats
  document.getElementById('loginError').textContent = '';
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('loginView').innerHTML = '<h1>🛡️ ObserveCo</h1><div class="loading">Verifying...</div>';

  fetchStats().then(() => {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashboardView').style.display = 'block';
    refresh();
  }).catch(err => {
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('loginView').innerHTML = `
      <h1>🛡️ ObserveCo Licenses</h1>
      <p style="color:var(--text-dim);font-size:0.85rem">Enter your admin API key</p>
      <input type="password" id="apiKeyInput" placeholder="Paste your admin API key" autofocus>
      <button class="btn btn-primary" onclick="login()" style="width:100%">Unlock Dashboard</button>
      <p class="error">${err.message || 'Failed to authenticate'}</p>
    `;
  });
}

function logout() {
  apiKey = '';
  try { localStorage.removeItem('observeco_admin_key'); } catch(e) {}
  location.reload();
}

function headers() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${apiKey}`,
  };
}

async function api(path, opts = {}) {
  const resp = await fetch(path, { ...opts, headers: opts.headers || headers() });
  if (resp.status === 401) {
    throw new Error('Unauthorized');
  }
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${resp.status}`);
  }
  return resp.json();
}

async function fetchStats() {
  const stats = await api('/api/admin/stats');
  return stats;
}

async function refresh() {
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="loading">Loading...</td></tr>';
  try {
    const search = document.getElementById('searchInput').value;
    const filter = document.getElementById('filterSelect').value;
    const sort = document.getElementById('sortSelect').value;
    const params = new URLSearchParams({ per_page: '200', sort: sort || 'created_at', order: 'desc' });
    if (search) params.set('q', search);
    if (filter && filter !== 'all') params.set('status', filter);

    const [stats, listResp, prods] = await Promise.all([
      api('/api/admin/stats'),
      api('/api/admin/licenses?' + params.toString()),
      api('/api/admin/products').catch(() => []),
    ]);

    products = prods || [];

    // Populate product dropdowns dynamically
    const prodOpts = products.map(p => `<option value="${esc(p.slug)}">${esc(p.name)} (${esc(p.price_display || '?')})</option>`).join('');
    const issueProduct = document.getElementById('issueProduct');
    const editProduct = document.getElementById('editProduct');
    if (prodOpts) {
      issueProduct.innerHTML = prodOpts;
      editProduct.innerHTML = prodOpts;
    }

    // Support both new (paginated) and old (flat) response
    licenses = listResp.data || listResp || [];
    renderStats(stats);
    renderTable();
  } catch (err) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="error" style="text-align:center;padding:40px;color:var(--red)">${err.message}</td></tr>`;
  }
}

function renderStats(stats) {
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="num" style="color:var(--green)">${stats.active || 0}</span><span class="label">Active</span></div>
    <div class="stat"><span class="num" style="color:var(--yellow)">${stats.trialing || 0}</span><span class="label">Trial</span></div>
    <div class="stat"><span class="num" style="color:var(--red)">${stats.expired || 0}</span><span class="label">Expired</span></div>
    <div class="stat"><span class="num" style="color:var(--text-dim)">${stats.total || 0}</span><span class="label">Total</span></div>
  `;
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterSelect').value;

  let rows = licenses.filter(l => {
    if (filter !== 'all' && l.status !== filter) return false;
    if (search && !l.email.toLowerCase().includes(search) && !(l.name || '').toLowerCase().includes(search)) return false;
    return true;
  });

  if (rows.length === 0) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty">No licenses found</td></tr>';
    return;
  }

document.getElementById('tableBody').innerHTML = rows.map(l => `
    <tr onclick="showDetail('${esc(l.license_key)}')" style="cursor:pointer">
      <td>${esc(l.email)}</td>
      <td>${esc(l.name || '-')}</td>
      <td>${esc(l.product_slug)}</td>
      <td><span class="status status-${esc(l.status)}">${l.status}</span></td>
      <td class="key-mono">${esc(l.license_key)}</td>
      <td>${fmtDate(l.created_at)}</td>
      <td>${l.expires_at ? fmtDate(l.expires_at) : '-'}</td>
      <td onclick="event.stopPropagation()">
        <button class="btn btn-primary" style="padding:4px 8px;font-size:0.75rem" onclick="showEditModal('${esc(l.license_key)}','${esc(l.email)}','${esc(l.name||'')}','${esc(l.product_slug)}','${l.expires_at||''}')">✎</button>
        ${l.status === 'active' || l.status === 'trialing' ? `<button class="btn btn-red" style="padding:4px 8px;font-size:0.75rem" onclick="suspendLicense('${esc(l.license_key)}')">⏸</button>` : l.status === 'expired' ? `<button class="btn btn-green" style="padding:4px 8px;font-size:0.75rem" onclick="reinstateLicense('${esc(l.license_key)}')">▶</button>` : ''}
        ${l.status !== 'cancelled' ? `<button class="btn btn-red" style="padding:4px 8px;font-size:0.75rem;margin-left:4px" onclick="deleteLicense('${esc(l.license_key)}')">✕</button>` : ''}
      </td>
    </tr>
  `).join('');
}

function showIssueModal() {
  document.getElementById('issueError').textContent = '';
  document.getElementById('issueEmail').value = '';
  document.getElementById('issueName').value = '';
  document.getElementById('issueDuration').value = '365';
  document.getElementById('issueModal').classList.add('show');
  document.getElementById('issueEmail').focus();
}

function closeIssueModal() {
  document.getElementById('issueModal').classList.remove('show');
}

async function issueLicense() {
  const email = document.getElementById('issueEmail').value.trim();
  const name = document.getElementById('issueName').value.trim();
  const duration = parseInt(document.getElementById('issueDuration').value);
  const product = document.getElementById('issueProduct').value;

  if (!email || !email.includes('@')) {
    document.getElementById('issueError').textContent = 'Valid email required';
    return;
  }

  document.getElementById('issueError').textContent = '';
  const btn = document.querySelector('#issueModal .btn-primary');
  btn.disabled = true;
  btn.textContent = 'Creating...';

  try {
    const result = await api('/api/admin/licenses', {
      method: 'POST',
      body: JSON.stringify({ email, name, product_slug: product, expires_in_days: duration }),
    });
    closeIssueModal();
    showToast(`✅ License created: ${result.license_key}`, 'success');
    refresh();
  } catch (err) {
    document.getElementById('issueError').textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create License';
  }
}

function showEditModal(key, email, name, product, expires) {
  document.getElementById('editKey').value = key;
  document.getElementById('editEmail').value = email;
  document.getElementById('editName').value = name === '-' ? '' : name;
  document.getElementById('editProduct').value = product || 'solo';
  document.getElementById('editExpires').value = expires ? expires.slice(0,10) : '';
  document.getElementById('editNotes').value = '';
  // Fetch full license to get notes
  api(`/api/admin/licenses/${encodeURIComponent(key)}`).then(l => {
    document.getElementById('editNotes').value = (l.metadata && l.metadata.notes) || '';
  }).catch(() => {});
  document.getElementById('editError').textContent = '';
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

async function saveEditLicense() {
  const key = document.getElementById('editKey').value;
  const email = document.getElementById('editEmail').value.trim();
  const name = document.getElementById('editName').value.trim();
  const product = document.getElementById('editProduct').value;
  const expires = document.getElementById('editExpires').value;

  if (!email || !email.includes('@')) {
    document.getElementById('editError').textContent = 'Valid email required';
    return;
  }

  const updates = { email, name, product_slug: product };
  if (expires) updates.expires_at = new Date(expires + 'T23:59:59Z').toISOString();
  const notes = document.getElementById('editNotes').value.trim();
  if (notes) updates.notes = notes;

  const btn = document.querySelector('#editModal .btn-primary');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    await api(`/api/admin/licenses/${encodeURIComponent(key)}`, {
      method: 'PATCH',
      body: JSON.stringify(updates),
    });
    closeEditModal();
    showToast('✅ License updated', 'success');
    refresh();
  } catch (err) {
    document.getElementById('editError').textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

async function suspendLicense(key) {
  if (!confirm(`Suspend license ${key}? The user will lose access.`)) return;
  try {
    const result = await api(`/api/admin/licenses/${encodeURIComponent(key)}/suspend`, {
      method: 'POST',
      body: JSON.stringify({ reason: 'Admin suspension' }),
    });
    showToast(`⏸ License suspended: ${result.license.license_key}`, 'success');
    refresh();
  } catch (err) {
    showToast(`❌ ${err.message}`, 'error');
  }
}

async function reinstateLicense(key) {
  if (!confirm(`Reinstate license ${key}? This will reactivate access.`)) return;
  try {
    const result = await api(`/api/admin/licenses/${encodeURIComponent(key)}/reinstate`, {
      method: 'POST',
      body: JSON.stringify({ reason: 'Admin reinstatement' }),
    });
    showToast(`▶ License reinstated: ${result.license.license_key}`, 'success');
    refresh();
  } catch (err) {
    showToast(`❌ ${err.message}`, 'error');
  }
}

async function showAuditLog() {
  try {
    const entries = await api('/api/admin/audit-log?limit=100');
    const modal = document.createElement('div');
    modal.className = 'modal show';
    modal.style.display = 'flex';
    modal.innerHTML = `
      <div class="modal-content" style="max-width:800px;max-height:80vh;overflow-y:auto">
        <h2>📋 Admin Audit Log</h2>
        <table style="width:100%;font-size:0.8rem;margin-top:12px">
          <thead>
            <tr><th style="padding:4px">Time</th><th style="padding:4px">Action</th><th style="padding:4px">License</th><th style="padding:4px">Details</th></tr>
          </thead>
          <tbody>
            ${entries.slice(0,100).map(e => {
              const oldVals = e.old_values ? Object.keys(e.old_values).filter(k => k !== 'metadata' && k !== 'updated_at').map(k => `${k}: ${esc(e.old_values[k])}`).join(', ') : '';
              const newVals = e.new_values ? Object.keys(e.new_values).filter(k => k !== 'metadata' && k !== 'updated_at').map(k => `${k}: ${esc(e.new_values[k])}`).join(', ') : '';
              return `<tr>
                <td style="padding:4px;white-space:nowrap">${fmtDate(e.created_at)}</td>
                <td style="padding:4px"><span style="padding:1px 6px;border-radius:4px;background:var(--bg);font-size:0.75rem">${esc(e.action)}</span></td>
                <td style="padding:4px;font-family:monospace;font-size:0.75rem">${esc(e.license_key || '-')}</td>
                <td style="padding:4px;color:var(--text-dim);font-size:0.75rem">${oldVals ? esc(oldVals) : '-'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <div class="modal-actions">
          <button class="btn" style="background:var(--border);color:var(--text)" onclick="this.closest('.modal').remove()">Close</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  } catch (err) {
    showToast('❌ ' + err.message, 'error');
  }
}

function exportCsv() {
  if (!licenses.length) { showToast('No data to export', 'error'); return; }
  const headers = ['License Key','Email','Name','Product','Status','Created','Expires','Issued By'];
  const rows = licenses.map(l => [
    l.license_key,
    l.email,
    l.name || '',
    l.product_slug,
    l.status,
    l.created_at,
    l.expires_at || '',
    l.issued_by || ''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'observeco-licenses-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 CSV exported (' + rows.length + ' rows)', 'success');
}

async function showDetail(key) {
  document.getElementById('detailTitle').textContent = 'License Details: ' + key;
  document.getElementById('detailBody').innerHTML = 'Loading...';
  document.getElementById('detailModal').classList.add('show');

  try {
    const [license, validations] = await Promise.all([
      api(`/api/admin/licenses/${encodeURIComponent(key)}`),
      api(`/api/admin/licenses/${encodeURIComponent(key)}/validations`),
    ]);

    let notesSection = '';
    if (license.metadata && license.metadata.notes) {
      notesSection = `<div style="margin-top:12px"><strong>Notes:</strong><br>${esc(license.metadata.notes)}</div>`;
    }

    const valRows = (validations || []).slice(0, 20).map(v => `
      <tr>
        <td style="color:${v.success ? 'var(--green)' : 'var(--red)'}">${v.success ? '✅' : '❌'}</td>
        <td>${fmtDate(v.created_at)}</td>
        <td style="font-size:0.75rem">${esc(v.ip_address || '-')}</td>
        <td style="font-size:0.75rem">${esc(v.machine_id ? v.machine_id.slice(0,12) : '-')}</td>
        <td style="font-size:0.75rem;color:var(--text-dim)">${esc((v.error_message || '').slice(0,40))}</td>
      </tr>
    `).join('');

    document.getElementById('detailBody').innerHTML = `
      <table style="width:100%;margin-bottom:12px">
        <tr><td style="color:var(--text-dim);width:100px">Email</td><td>${esc(license.email)}</td></tr>
        <tr><td style="color:var(--text-dim)">Name</td><td>${esc(license.name || '-')}</td></tr>
        <tr><td style="color:var(--text-dim)">Product</td><td>${esc(license.product_slug)}</td></tr>
        <tr><td style="color:var(--text-dim)">Status</td><td><span class="status status-${esc(license.status)}">${license.status}</span></td></tr>
        <tr><td style="color:var(--text-dim)">Created</td><td>${fmtDate(license.created_at)}</td></tr>
        <tr><td style="color:var(--text-dim)">Expires</td><td>${license.expires_at ? fmtDate(license.expires_at) : '-'}</td></tr>
        <tr><td style="color:var(--text-dim)">Issued By</td><td>${esc(license.issued_by || '-')}</td></tr>
        <tr><td style="color:var(--text-dim)">Stripe</td><td>${license.stripe_subscription_id ? `<a href="https://dashboard.stripe.com/subscriptions/${esc(license.stripe_subscription_id)}" target="_blank" style="color:var(--accent)">${esc(license.stripe_subscription_id.slice(0,16))}…</a>` : '-'}</td></tr>
      </table>
      ${notesSection}
      <h3 style="font-size:0.85rem;margin:12px 0 6px;color:var(--text-dim)">Recent Validations (${(validations||[]).length})</h3>
      <table style="width:100%;font-size:0.8rem">
        <thead>
          <tr><th style="padding:4px">Result</th><th style="padding:4px">Time</th><th style="padding:4px">IP</th><th style="padding:4px">Machine</th><th style="padding:4px">Error</th></tr>
        </thead>
        <tbody>${valRows || '<tr><td colspan="5" style="padding:12px;text-align:center;color:var(--text-dim)">No validation history yet</td></tr>'}</tbody>
      </table>
    `;
  } catch (err) {
    document.getElementById('detailBody').innerHTML = `<div class="error">${err.message}</div>`;
  }
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('show');
}

async function deleteLicense(key) {
  if (!confirm(`Cancel license ${key}? This will revoke access permanently. The user will need a new license.`)) return;
  try {
    const result = await api(`/api/admin/licenses/${encodeURIComponent(key)}`, {
      method: 'DELETE',
    });
    showToast(`✕ License cancelled: ${result.license.license_key}`, 'success');
    refresh();
  } catch (err) {
    showToast(`❌ ${err.message}`, 'error');
  }
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 4000);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { year: 'numeric', month: 'short', day: 'numeric' });
}

// Auto-login if key in localStorage
(function() {
  const saved = localStorage.getItem('observeco_admin_key');
  if (saved) {
    apiKey = saved;
    document.getElementById('dashboardView').style.display = 'block';
    document.getElementById('loginView').style.display = 'none';
    refresh();
  }
})();
</script>
</body>
</html>
