<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObserveCo License CRM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--radius:8px;--font:-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);padding:16px;line-height:1.5}
h1{font-size:1.4rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
h1 small{font-size:0.7rem;color:var(--text-dim);font-weight:400}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-width:80px}
.stat .num{font-size:1.5rem;font-weight:700;display:block}
.stat .label{font-size:0.75rem;color:var(--text-dim);text-transform:uppercase}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.9rem}
.toolbar input{flex:1;min-width:200px}
.toolbar select{min-width:120px}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:0.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:0.85rem}
th{background:var(--surface);color:var(--text-dim);font-weight:600;font-size:0.75rem;text-transform:uppercase}
tr:last-child td{border-bottom:none}
.status{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.75rem;font-weight:600}
.status-active{background:#3fb95022;color:var(--green)}
.status-trialing{background:#d2992222;color:var(--yellow)}
.status-expired{background:#f8514922;color:var(--red)}
.status-cancelled{background:#8b949e22;color:var(--text-dim)}
.key-mono{font-family:monospace;font-size:0.8rem;color:var(--text-dim);letter-spacing:0.5px}
.empty{text-align:center;padding:40px;color:var(--text-dim);font-size:0.9rem}
.login-box{max-width:400px;margin:60px auto;text-align:center}
.login-box input{width:100%;padding:12px;margin:12px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;text-align:center}
.error{color:var(--red);font-size:0.85rem;margin-top:8px}
.loading{text-align:center;padding:40px;color:var(--text-dim)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000088;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:420px;width:90%}
.modal-content h2{margin-bottom:16px;font-size:1.1rem}
.modal-content label{display:block;font-size:0.85rem;color:var(--text-dim);margin-bottom:4px;margin-top:12px}
.modal-content input,.modal-content select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.9rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 24px #00000044;font-size:0.85rem;display:none;z-index:200;max-width:360px}
.toast.show{display:block}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
@media(max-width:600px){h1{font-size:1.1rem}.toolbar{flex-direction:column}table{font-size:0.8rem}th,td{padding:6px 8px}}
</style>
</head>
<body>

<div id="app">
  <div id="loginView" class="login-box">
    <h1>🛡️ ObserveCo Licenses</h1>
    <p style="color:var(--text-dim);font-size:0.85rem">Enter your admin API key</p>
    <input type="password" id="apiKeyInput" placeholder="Paste your admin API key" autofocus>
    <button class="btn btn-primary" onclick="login()" style="width:100%">Unlock Dashboard</button>
    <p id="loginError" class="error"></p>
  </div>

  <div id="dashboardView" style="display:none">
    <h1>🛡️ ObserveCo Licenses <small>CRM</small></h1>

    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search by email or name..." oninput="renderTable()">
      <select id="filterSelect" onchange="renderTable()">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="trialing">Trial</option>
        <option value="expired">Expired</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button class="btn btn-green" onclick="showIssueModal()">+ Issue Free License</button>
      <button class="btn btn-primary" style="background:var(--text-dim)" onclick="refresh()">↻ Refresh</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Name</th>
          <th>Product</th>
          <th>Status</th>
          <th>License Key</th>
          <th>Created</th>
          <th>Expires</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" id="issueModal">
  <div class="modal-content">
    <h2>Issue Free License</h2>
    <label for="issueEmail">Email *</label>
    <input type="email" id="issueEmail" placeholder="user@example.com">
    <label for="issueName">Name</label>
    <input type="text" id="issueName" placeholder="Optional">
    <label for="issueDuration">Duration</label>
    <select id="issueDuration">
      <option value="30">30 days</option>
      <option value="90">90 days</option>
      <option value="365" selected>1 year</option>
      <option value="36500">Lifetime (~100 years)</option>
    </select>
    <label for="issueProduct">Product</label>
    <select id="issueProduct">
      <option value="solo">Solo ($9/mo)</option>
    </select>
    <div class="modal-actions">
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="closeIssueModal()">Cancel</button>
      <button class="btn btn-primary" onclick="issueLicense()">Create License</button>
    </div>
    <p id="issueError" class="error"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let apiKey = '';
let licenses = [];
let keyCache = null;

function login() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) {
    document.getElementById('loginError').textContent = 'Enter your API key';
    return;
  }

  // Store in localStorage
  try { localStorage.setItem('observeco_admin_key', apiKey); } catch(e) {}

  // Test the key by fetching stats
  document.getElementById('loginError').textContent = '';
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('loginView').innerHTML = '<h1>🛡️ ObserveCo</h1><div class="loading">Verifying...</div>';

  fetchStats().then(() => {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashboardView').style.display = 'block';
    refresh();
  }).catch(err => {
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('loginView').innerHTML = `
      <h1>🛡️ ObserveCo Licenses</h1>
      <p style="color:var(--text-dim);font-size:0.85rem">Enter your admin API key</p>
      <input type="password" id="apiKeyInput" placeholder="Paste your admin API key" autofocus>
      <button class="btn btn-primary" onclick="login()" style="width:100%">Unlock Dashboard</button>
      <p class="error">${err.message || 'Failed to authenticate'}</p>
    `;
  });
}

function logout() {
  apiKey = '';
  try { localStorage.removeItem('observeco_admin_key'); } catch(e) {}
  location.reload();
}

function headers() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${apiKey}`,
  };
}

async function api(path, opts = {}) {
  const resp = await fetch(path, { ...opts, headers: opts.headers || headers() });
  if (resp.status === 401) {
    throw new Error('Unauthorized');
  }
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${resp.status}`);
  }
  return resp.json();
}

async function fetchStats() {
  const stats = await api('/api/admin/stats');
  return stats;
}

async function refresh() {
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="loading">Loading...</td></tr>';
  try {
    const [stats, list] = await Promise.all([
      api('/api/admin/stats'),
      api('/api/admin/licenses'),
    ]);
    licenses = list || [];
    renderStats(stats);
    renderTable();
  } catch (err) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="error" style="text-align:center;padding:40px;color:var(--red)">${err.message}</td></tr>`;
  }
}

function renderStats(stats) {
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="num" style="color:var(--green)">${stats.active || 0}</span><span class="label">Active</span></div>
    <div class="stat"><span class="num" style="color:var(--yellow)">${stats.trialing || 0}</span><span class="label">Trial</span></div>
    <div class="stat"><span class="num" style="color:var(--red)">${stats.expired || 0}</span><span class="label">Expired</span></div>
    <div class="stat"><span class="num" style="color:var(--text-dim)">${stats.total || 0}</span><span class="label">Total</span></div>
  `;
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterSelect').value;

  let rows = licenses.filter(l => {
    if (filter !== 'all' && l.status !== filter) return false;
    if (search && !l.email.toLowerCase().includes(search) && !(l.name || '').toLowerCase().includes(search)) return false;
    return true;
  });

  if (rows.length === 0) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty">No licenses found</td></tr>';
    return;
  }

  document.getElementById('tableBody').innerHTML = rows.map(l => `
    <tr>
      <td>${esc(l.email)}</td>
      <td>${esc(l.name || '-')}</td>
      <td>${esc(l.product_slug)}</td>
      <td><span class="status status-${esc(l.status)}">${l.status}</span></td>
      <td class="key-mono">${esc(l.license_key)}</td>
      <td>${fmtDate(l.created_at)}</td>
      <td>${l.expires_at ? fmtDate(l.expires_at) : '-'}</td>
    </tr>
  `).join('');
}

function showIssueModal() {
  document.getElementById('issueError').textContent = '';
  document.getElementById('issueEmail').value = '';
  document.getElementById('issueName').value = '';
  document.getElementById('issueDuration').value = '365';
  document.getElementById('issueModal').classList.add('show');
  document.getElementById('issueEmail').focus();
}

function closeIssueModal() {
  document.getElementById('issueModal').classList.remove('show');
}

async function issueLicense() {
  const email = document.getElementById('issueEmail').value.trim();
  const name = document.getElementById('issueName').value.trim();
  const duration = parseInt(document.getElementById('issueDuration').value);
  const product = document.getElementById('issueProduct').value;

  if (!email || !email.includes('@')) {
    document.getElementById('issueError').textContent = 'Valid email required';
    return;
  }

  document.getElementById('issueError').textContent = '';
  const btn = document.querySelector('#issueModal .btn-primary');
  btn.disabled = true;
  btn.textContent = 'Creating...';

  try {
    const result = await api('/api/admin/licenses', {
      method: 'POST',
      body: JSON.stringify({ email, name, product_slug: product, expires_in_days: duration }),
    });
    closeIssueModal();
    showToast(`✅ License created: ${result.license_key}`, 'success');
    refresh();
  } catch (err) {
    document.getElementById('issueError').textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create License';
  }
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 4000);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { year: 'numeric', month: 'short', day: 'numeric' });
}

// Auto-login if key in localStorage
(function() {
  const saved = localStorage.getItem('observeco_admin_key');
  if (saved) {
    apiKey = saved;
    document.getElementById('dashboardView').style.display = 'block';
    document.getElementById('loginView').style.display = 'none';
    refresh();
  }
})();
</script>
</body>
</html>
